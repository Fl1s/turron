server:
  port: 8095

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: eureka-server

eureka:
  instance:
    hostname: eureka.turron.svc.cluster.local
  client:
    registerWithEureka: false
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/