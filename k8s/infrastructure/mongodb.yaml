apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: turron
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-creds
  namespace: turron
type: Opaque
stringData:
  username: "admin"
  password: "secret"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: turron
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      initContainers:
        - name: init-mongodb
          image: mongo:latest
          command:
            - mongosh
            - --host
            - mongodb
            - --port
            - "27017"
            - -u
            - "$(MONGO_INITDB_ROOT_USERNAME)"
            - -p
            - "$(MONGO_INITDB_ROOT_PASSWORD)"
            - --authenticationDatabase
            - admin
            - --eval
            - |
              db = db.getSiblingDB('thoughts');
              db.createCollection('thoughts');
              db.thoughts.insertOne({ initialized: true });
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-creds
                  key: username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-creds
                  key: password
      containers:
        - name: mongodb
          image: mongo:latest
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-creds
                  key: username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-creds
                  key: password
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: mongodb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: turron
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP