apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-core
  namespace: turron
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-core
  template:
    metadata:
      labels:
        app: memory-core
    spec:
      initContainers:
        - name: wait-for-eureka
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - 'until curl -s http://eureka-server:8095/eureka/apps > /dev/null; do echo "Waiting for Eureka Server..."; sleep 5; done'
      containers:
        - name: memory-core
          image: ghcr.io/fl1s/memory-core:latest
          ports:
            - containerPort: 8092
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
      imagePullSecrets:
        - name: ghcr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: memory-core
  namespace: turron
spec:
  selector:
    app: memory-core
  ports:
    - port: 8092
      targetPort: 8092
